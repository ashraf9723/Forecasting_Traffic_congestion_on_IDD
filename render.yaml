services:
  - type: web
    name: traffic-congestion-forecast
    runtime: python
    pythonVersion: 3.9
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run data/app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
