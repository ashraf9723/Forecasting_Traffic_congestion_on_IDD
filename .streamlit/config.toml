[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
headless = true
port = 8080
enableXsrfProtection = true

[client]
toolbarMode = "viewer"
showErrorDetails = false

[logger]
level = "info"

[ui]
hideTopBar = false
hideMainMenuButton = false
